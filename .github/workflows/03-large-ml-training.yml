name: 03 - Large - ML Training Job

# Example of a "large" pipeline: heavy compute (model training, large
# Docker builds, integration matrix). Dispatcher should size this as
# `large` (4 vCPU / 8 GiB).

on:
  workflow_dispatch:
    inputs:
      dataset_size:
        description: "Dataset size hint (small|medium|large)"
        required: true
        default: "large"
      deferrable:
        description: "Allow carbon-aware deferral to a greener grid window"
        type: boolean
        default: true
      deferred_from:
        description: "(internal) Original run_id when re-triggered by the carbon scheduler"
        required: false
        default: ""
  schedule:
    # Nightly retrain
    - cron: "0 2 * * *"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.size.outputs.runner-label }}
      size: ${{ steps.size.outputs.size }}
      deferred: ${{ steps.size.outputs.deferred }}
      scheduled-for: ${{ steps.size.outputs.scheduled-for }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r orchestrator/requirements.txt
      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}
      - id: size
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ACA_BASE_NAME: ${{ secrets.ACA_BASE_NAME }}
          GH_PAT: ${{ secrets.RUNNER_REGISTRATION_PAT }}
          GH_REPO: ${{ github.repository }}
          ELECTRICITYMAPS_API_KEY: ${{ secrets.ELECTRICITYMAPS_API_KEY }}
          GRID_ZONE: ${{ vars.GRID_ZONE }}
          CARBON_MOCK: ${{ vars.CARBON_MOCK }}
          CARBON_QUEUE_ACCOUNT_URL: ${{ secrets.CARBON_QUEUE_ACCOUNT_URL }}
        run: |
          DEFERRABLE_FLAG=""
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ inputs.deferrable }}" == "true" ]]; then
            DEFERRABLE_FLAG="--deferrable"
          fi
          python orchestrator/dispatch_runner.py \
            --workflow .github/workflows/03-large-ml-training.yml \
            --run-id ${{ github.run_id }} \
            $DEFERRABLE_FLAG

  train:
    needs: dispatch
    if: needs.dispatch.outputs.deferred != 'true'
    runs-on: [self-hosted, "${{ needs.dispatch.outputs.runner-label }}"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ML deps
        run: pip install numpy pandas scikit-learn
      - name: Train model (simulated)
        run: |
          python -c "
          import numpy as np
          from sklearn.ensemble import RandomForestRegressor
          X = np.random.rand(100000, 20)
          y = np.random.rand(100000)
          model = RandomForestRegressor(n_estimators=200, max_depth=16, n_jobs=2)
          model.fit(X, y)
          print('Trained model on', X.shape, 'samples')
          "
