name: _Dispatcher (reusable)

# Reusable workflow that any pipeline can call to obtain a right-sized
# self-hosted runner. This is an alternative to inlining the `dispatch`
# job in every workflow.
#
# Usage from a calling workflow:
#
#   jobs:
#     dispatch:
#       uses: ./.github/workflows/dispatcher-reusable.yml
#       with:
#         workflow-path: .github/workflows/02-medium-test.yml
#       secrets: inherit
#
#     work:
#       needs: dispatch
#       runs-on: [self-hosted, "${{ needs.dispatch.outputs.runner-label }}"]
#       steps: ...

on:
  workflow_call:
    inputs:
      workflow-path:
        description: "Path to the calling workflow YAML"
        required: true
        type: string
    outputs:
      runner-label:
        description: "Label of the self-hosted runner to target"
        value: ${{ jobs.size.outputs.runner-label }}
      size:
        description: "Chosen size tier (small|medium|large)"
        value: ${{ jobs.size.outputs.size }}

jobs:
  size:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.decide.outputs.runner-label }}
      size: ${{ steps.decide.outputs.size }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r orchestrator/requirements.txt
      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}
      - id: decide
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ACA_BASE_NAME: ${{ secrets.ACA_BASE_NAME }}
          GH_PAT: ${{ secrets.RUNNER_REGISTRATION_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          python orchestrator/dispatch_runner.py \
            --workflow "${{ inputs.workflow-path }}" \
            --run-id ${{ github.run_id }}
